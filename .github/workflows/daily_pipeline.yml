name: AERSI Daily Pipeline

on:
  schedule:
    # 10:30 AM IST = 05:00 UTC
    - cron: "0 5 * * *"
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit snapshot data back to repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run AERSI pipeline
        env:
          DATA_GOV_API_KEY: ${{ secrets.DATA_GOV_API_KEY }}
        run: python src/pipeline.py

      - name: Commit new snapshot and outputs
        run: |
          git config user.name  "aersi-bot"
          git config user.email "aersi-bot@users.noreply.github.com"
          git add data/snapshots/ data/processed/ outputs/
          git diff --cached --quiet || git commit -m "data: daily snapshot $(date -u '+%Y-%m-%d')"
          git push
