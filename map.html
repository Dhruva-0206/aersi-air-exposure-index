<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Map — AERSI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%230d6efd'/><text y='.9em' font-size='55' x='8' fill='white' font-weight='bold'>AE</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/layout.js"></script>
  <script src="js/main.js"></script>
  <style>
    .map-page {
      height: calc(100vh - var(--nav-h));
      display: flex;
      flex-direction: column;
    }

    .map-toolbar {
      padding: 0.875rem 1.75rem;
      background: white;
      border-bottom: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 1rem;
    }

    .map-toolbar-left { display: flex; align-items: center; gap: 1.25rem; }

    .map-toolbar h1 {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .map-meta {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--text3);
      letter-spacing: 0.04em;
      margin-top: 2px;
    }

    .map-legend {
      display: flex;
      align-items: center;
      gap: 1.25rem;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.775rem;
      color: var(--text2);
      font-weight: 500;
      white-space: nowrap;
    }

    .legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

    .map-frame { flex: 1; position: relative; }

    .map-frame iframe { width: 100%; height: 100%; border: none; display: block; }

    .map-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 10;
      transition: opacity 0.4s var(--ease);
    }

    .map-loader.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .map-legend { display: none; }
      .map-toolbar { padding: 0.75rem 1rem; }
    }
  </style>
</head>
<body>
  <div id="nav-root"></div>

  <div class="page">
    <div class="map-page">
      <div class="map-toolbar">
        <div class="map-toolbar-left">
          <div>
            <h1>AERSI Live Map</h1>
            <div class="map-meta" id="map-meta">547 stations · Updated daily at 10:30 AM IST</div>
          </div>
        </div>
        <div class="map-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#16a34a;"></div> Very Low &lt;0.8</div>
          <div class="legend-item"><div class="legend-dot" style="background:#65a30d;"></div> Low 0.8–1.2</div>
          <div class="legend-item"><div class="legend-dot" style="background:#d97706;"></div> Moderate 1.2–2.0</div>
          <div class="legend-item"><div class="legend-dot" style="background:#ea580c;"></div> High 2.0–3.0</div>
          <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div> Extreme &gt;3.0</div>
        </div>
      </div>

      <div class="map-frame">
        <div class="map-loader" id="map-loader">
          <div style="text-align:center;">
            <div class="spinner" style="margin:0 auto 1rem;"></div>
            <div style="font-size:0.875rem;color:var(--text3);">Loading map...</div>
          </div>
        </div>
        <iframe
          src="outputs/aersi_map.html"
          title="AERSI Interactive Map"
          onload="document.getElementById('map-loader').classList.add('hidden')"
        ></iframe>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('nav-root').innerHTML = renderNav();
    setActiveNav();

    async function initMap() {
      const data = await loadStationData();
      if (data.length) {
        document.getElementById('map-meta').textContent =
          `${data.length} stations · AERSI = PL × EPF × VSF · Updated daily 10:30 AM IST`;
      }
    }
    initMap();
  </script>
</body>
</html>
